<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>次方與根號計算</title>
</head>
<body>
    <h2>次方與根號計算</h2>
    <form action="/math_result" method="POST">
        數字 x：<input type="number" name="x" step="any" required>
        <br><br>
        
        運算：
        <select name="opt">
            <option value="^">^ (次方)</option>
            <option value="√">√ (根號)</option>
        </select>
        <br><br>
        
        數字 y：<input type="number" name="y" step="any" required>
        <br><br>
        
        <input type="submit" value="計算">
    </form>
    <br>
    <a href="/">返回首頁</a>
</body>
</html>
